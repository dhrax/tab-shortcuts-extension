<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Tab Shortcuts</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 380px;
        margin: 0;
        font-family: Inter, Arial, Helvetica, sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      .panel {
        padding: 12px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 3px;
        color: #9ca3af;
        font-size: 11px;
      }

      .open-shortcut {
        padding: 4px 7px;
        border-radius: 7px;
        background: #374151;
        color: #d1d5db;
        font-size: 10px;
        white-space: nowrap;
      }

      .card {
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #374151;
        border-radius: 12px;
        background: #1f2937;
      }

      .section-title {
        margin-bottom: 10px;
        color: #d1d5db;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .tab-title {
        overflow: hidden;
        margin-bottom: 4px;
        font-size: 13px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tab-url {
        overflow: hidden;
        color: #9ca3af;
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .top-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .badge {
        padding: 3px 6px;
        border-radius: 999px;
        background: #374151;
        color: #d1d5db;
        font-size: 10px;
      }

      .stats-inline {
        display: grid;
        grid-template-columns: repeat(3, 52px);
        gap: 6px;
      }

      .stat {
        padding: 7px;
        border-radius: 9px;
        background: #111827;
        text-align: center;
      }

      .stat-value {
        font-size: 14px;
        font-weight: 700;
      }

      .stat-label {
        margin-top: 1px;
        color: #9ca3af;
        font-size: 9px;
      }

      .tab-nav {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        margin-bottom: 10px;
      }

      .tab-button {
        padding: 8px 10px;
        border: 1px solid #374151;
        border-radius: 10px;
        background: #111827;
        color: #d1d5db;
        font-size: 11px;
        text-align: center;
        cursor: pointer;
      }

      .tab-button.active,
      .tab-button:hover {
        background: #1f2937;
      }

      .hidden {
        display: none;
      }

      .small-button {
        border: 1px solid #374151;
        border-radius: 10px;
        background: #111827;
        color: #f9fafb;
        padding: 8px 10px;
        font-size: 11px;
        cursor: pointer;
      }

      .small-button:hover {
        background: #1f2937;
      }

      .small-button.danger {
        border-color: #b91c1c;
        color: #fecaca;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .action-confirmation {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid #7f1d1d;
        border-radius: 12px;
        background: #111827;
      }

      .action-confirmation.hidden {
        display: none;
      }

      .action-confirmation .confirmation-text {
        color: #f9fafb;
        font-size: 12px;
      }

      .confirmation-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .form-row {
        display: grid;
        gap: 8px;
      }

      .form-row input,
      .form-row textarea,
      .form-row button,
      .copy-grid {
        width: 100%;
      }

      input,
      textarea {
        border: 1px solid #374151;
        border-radius: 10px;
        background: #111827;
        color: #f9fafb;
        padding: 10px;
        font-size: 12px;
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .copy-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .search-results,
      .sessions-list,
      .snippets-list {
        display: grid;
        gap: 8px;
        max-height: 260px;
        overflow-y: auto;
        padding-right: 2px;
      }

      .search-item,
      .session-item,
      .snippet-item {
        padding: 10px;
        border: 1px solid #374151;
        border-radius: 12px;
        background: #111827;
      }

      .search-item-info,
      .session-item-header,
      .snippet-item-header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .search-item-title,
      .session-item-title,
      .snippet-item-title {
        font-weight: 700;
        font-size: 13px;
      }

      .search-item-url,
      .session-item-meta,
      .snippet-item-meta {
        color: #9ca3af;
        font-size: 11px;
        min-width: 0;
      }

      .search-item-actions,
      .session-item-actions,
      .snippet-item-actions {
        display: grid;
        gap: 6px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .snippet-item-content {
        white-space: pre-wrap;
        color: #d1d5db;
        font-size: 12px;
        margin-bottom: 8px;
      }

      .empty-message {
        color: #9ca3af;
        font-size: 12px;
      }

      .status {
        min-height: 18px;
        color: #9ca3af;
        font-size: 11px;
        margin-top: 8px;
      }

      .status.success {
        color: #86efac;
      }

      .status.error {
        color: #fca5a5;
      }
    </style>
  </head>

  <body>
    <div class="panel">
      <header class="header">
        <div>
          <h1 class="title">Tab Shortcuts</h1>
          <div class="subtitle">Productivity panel</div>
        </div>

        <div class="open-shortcut">Alt + Shift + A</div>
      </header>

      <section class="card">
        <div class="top-row">
          <div>
            <div class="section-title">Current tab</div>
            <div id="current-tab-title" class="tab-title">Loading tab...</div>
            <div id="current-tab-url" class="tab-url"></div>

            <div class="badges">
              <span id="current-tab-status" class="badge">Status</span>
              <span id="current-tab-muted" class="badge">Audio</span>
            </div>
          </div>

          <div class="stats-inline">
            <div class="stat">
              <div id="total-tabs" class="stat-value">0</div>
              <div class="stat-label">Tabs</div>
            </div>
            <div class="stat">
              <div id="muted-tabs" class="stat-value">0</div>
              <div class="stat-label">Muted</div>
            </div>
            <div class="stat">
              <div id="audible-tabs" class="stat-value">0</div>
              <div class="stat-label">Audio</div>
            </div>
          </div>
        </div>
      </section>

      <nav class="tab-nav">
        <button type="button" class="tab-button active" data-section="actions-section">Actions</button>
        <button type="button" class="tab-button" data-section="search-section">Search</button>
        <button type="button" class="tab-button" data-section="sessions-section">Sessions</button>
        <button type="button" class="tab-button" data-section="links-section">Links</button>
        <button type="button" class="tab-button" data-section="snippets-section">Snippets</button>
      </nav>

      <section id="actions-section" class="card section-panel">
        <div class="section-title">Quick actions</div>

        <div class="action-grid">
          <button type="button" class="small-button" data-tab-action="duplicate-current-tab">Duplicate</button>
          <button type="button" class="small-button" data-tab-action="toggle-mute-current-tab">Mute / Unmute</button>
          <button type="button" class="small-button" data-tab-action="mute-other-tabs">Mute others</button>
          <button type="button" class="small-button" data-tab-action="close-duplicate-tabs">Close duplicates</button>
          <button type="button" class="small-button" data-tab-action="close-tabs-to-left">Close left</button>
          <button type="button" class="small-button" data-tab-action="close-tabs-to-right">Close right</button>
          <button type="button" class="small-button" data-tab-action="close-other-tabs">Close others</button>
          <button type="button" class="small-button" data-tab-action="toggle-pin-current-tab">Pin / Unpin</button>
        </div>

        <div id="action-confirmation" class="action-confirmation hidden" aria-live="polite">
          <div id="action-confirm-text" class="confirmation-text"></div>
          <div class="confirmation-controls">
            <button id="confirm-action-button" type="button" class="small-button danger">Confirm</button>
            <button id="cancel-action-button" type="button" class="small-button">Cancel</button>
          </div>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section id="search-section" class="card section-panel hidden">
        <div class="section-title">Search tabs</div>
        <div class="form-row">
          <input id="tab-search-input" type="search" placeholder="Search by title or URL" />
        </div>
        <div id="tab-search-results" class="search-results"></div>
      </section>

      <section id="sessions-section" class="card section-panel hidden">
        <div class="section-title">Saved sessions</div>
        <div class="form-row">
          <input id="session-name-input" type="text" placeholder="Session name" />
          <button id="save-session-button" type="button" class="small-button">Save session</button>
        </div>
        <div class="form-row">
          <button id="export-data-button" type="button" class="small-button">Export data</button>
          <input id="import-data-input" type="file" accept="application/json" />
        </div>
        <div id="sessions-list" class="sessions-list"></div>
      </section>

      <section id="links-section" class="card section-panel hidden">
        <div class="section-title">Copy links</div>
        <div class="copy-grid">
          <button type="button" class="small-button" data-copy-action="current-url-plain">Current URL</button>
          <button type="button" class="small-button" data-copy-action="current-url-markdown">Current URL MD</button>
          <button type="button" class="small-button" data-copy-action="window-urls-plain">All URLs</button>
          <button type="button" class="small-button" data-copy-action="window-urls-markdown">All MD</button>
        </div>
      </section>

      <section id="snippets-section" class="card section-panel hidden">
        <div class="section-title">Personal snippets</div>
        <div class="form-row">
          <input id="snippet-title-input" type="text" placeholder="Snippet title" />
          <textarea id="snippet-content-input" placeholder="Snippet content"></textarea>
          <button id="add-snippet-button" type="button" class="small-button">Add snippet</button>
        </div>
        <div id="snippets-list" class="snippets-list"></div>
      </section>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
