<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Tab Shortcuts</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="panel">
      <header class="header">
        <div>
          <h1 class="title">Tab Shortcuts</h1>
          <div class="subtitle">Productivity panel</div>
        </div>

        <div class="header-actions">
          <button id="open-options-button" type="button" class="small-button">Options</button>
          <div class="open-shortcut">Alt + Shift + A</div>
        </div>
      </header>

      <section class="card command-palette">
        <div class="form-row">
          <input id="command-search-input" type="search" placeholder="Search commands" autocomplete="off" />
        </div>
        <div id="command-results" class="command-results"></div>
      </section>

      <section class="card">
        <div class="top-row">
          <div>
            <div class="section-title">Current tab</div>
            <div id="current-tab-title" class="tab-title">Loading tab...</div>
            <div id="current-tab-url" class="tab-url"></div>

            <div class="badges">
              <span id="current-tab-status" class="badge">Status</span>
              <span id="current-tab-muted" class="badge">Audio</span>
            </div>
          </div>

          <div class="stats-inline">
            <div class="stat">
              <div id="total-tabs" class="stat-value">0</div>
              <div class="stat-label">Tabs</div>
            </div>
            <div class="stat">
              <div id="muted-tabs" class="stat-value">0</div>
              <div class="stat-label">Muted</div>
            </div>
            <div class="stat">
              <div id="audible-tabs" class="stat-value">0</div>
              <div class="stat-label">Audio</div>
            </div>
          </div>
        </div>
      </section>

      <div class="view-selector-wrapper">
        <select id="view-selector" class="view-selector">
          <option value="actions-section">Actions</option>
          <option value="search-section">Search</option>
          <option value="sessions-section">Sessions</option>
          <option value="workspaces-section">Workspaces</option>
          <option value="rules-section">Rules</option>
          <option value="links-section">Links</option>
          <option value="snippets-section">Snippets</option>
          <option value="cleanup-section">Cleanup</option>
          <option value="notes-section">Notes</option>
        </select>
      </div>

      <section id="actions-section" class="card section-panel">
        <div class="section-title">Quick actions</div>

        <div class="action-grid">
          <button type="button" class="small-button" data-tab-action="duplicate-current-tab">Duplicate</button>
          <button type="button" class="small-button" data-tab-action="toggle-mute-current-tab">Mute / Unmute</button>
          <button type="button" class="small-button" data-tab-action="mute-other-tabs">Mute others</button>
          <button type="button" class="small-button" data-tab-action="close-duplicate-tabs">Close duplicates</button>
          <button type="button" class="small-button" data-tab-action="close-tabs-to-left">Close left</button>
          <button type="button" class="small-button" data-tab-action="close-tabs-to-right">Close right</button>
          <button type="button" class="small-button" data-tab-action="close-other-tabs">Close others</button>
          <button type="button" class="small-button" data-tab-action="group-tabs-by-domain">Group by domain</button>
          <button type="button" class="small-button" data-tab-action="sort-tabs-by-domain">Sort by domain</button>
          <button type="button" class="small-button" data-tab-action="toggle-pin-current-tab">Pin / Unpin</button>
        </div>

        <div id="action-confirmation" class="action-confirmation hidden" aria-live="polite">
          <div id="action-confirm-text" class="confirmation-text"></div>
          <div class="confirmation-controls">
            <button id="confirm-action-button" type="button" class="small-button danger">Confirm</button>
            <button id="cancel-action-button" type="button" class="small-button">Cancel</button>
          </div>
        </div>

        <div class="history-section">
          <div class="history-heading">
            <div class="section-title">History</div>
            <div class="history-actions">
              <button id="undo-button" type="button" class="small-button">Undo last action</button>
              <button id="clear-history-button" type="button" class="small-button">Clear</button>
            </div>
          </div>
          <div id="undo-history-list" class="history-list"></div>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section id="search-section" class="card section-panel hidden">
        <div class="section-title">Search tabs</div>
        <div class="form-row">
          <input id="tab-search-input" type="search" placeholder="Search by title or URL" />
        </div>
        <div class="search-actions">
          <div id="selected-count" class="selected-count">0 selected</div>
          <button id="close-selected-button" type="button" class="small-button danger">Close selected</button>
          <button id="mute-selected-button" type="button" class="small-button">Mute selected</button>
          <button id="unmute-selected-button" type="button" class="small-button">Unmute selected</button>
          <button id="pin-selected-button" type="button" class="small-button">Pin selected</button>
          <button id="move-selected-button" type="button" class="small-button">Move selected to new window</button>
        </div>
        <div id="tab-search-results" class="search-results"></div>
      </section>

      <section id="sessions-section" class="card section-panel hidden">
        <div class="section-title">Saved sessions</div>
        <div class="form-row">
          <input id="session-name-input" type="text" placeholder="Session name" />
          <button id="save-session-button" type="button" class="small-button">Save session</button>
        </div>
        <div class="form-row">
          <button id="export-data-button" type="button" class="small-button">Export data</button>
          <input id="import-data-input" type="file" accept="application/json" />
        </div>
        <div id="sessions-list" class="sessions-list"></div>
      </section>

      <section id="workspaces-section" class="card section-panel hidden">
        <div class="section-title">Workspaces</div>
        <div class="form-row">
          <input id="workspace-name-input" type="text" placeholder="Workspace name" />
          <input id="workspace-url-input" type="text" placeholder="Workspace URL" />
          <button id="add-workspace-button" type="button" class="small-button">Add workspace</button>
        </div>
        <div class="form-row">
          <button id="add-current-tab-workspace-button" type="button" class="small-button">Add current tab to workspace</button>
          <button id="add-window-tabs-workspace-button" type="button" class="small-button">Add window tabs to workspace</button>
        </div>
        <div id="workspaces-list" class="sessions-list"></div>
      </section>

      <section id="rules-section" class="card section-panel hidden">
        <div class="section-title">Auto rules</div>
        <div class="form-row">
          <input id="rule-hostname-input" type="text" placeholder="Hostname or domain" />
          <select id="rule-action-select">
            <option value="mute">Auto mute</option>
            <option value="pin">Auto pin</option>
            <option value="group">Auto group</option>
          </select>
          <button id="add-rule-button" type="button" class="small-button">Add rule</button>
        </div>
        <div id="rules-list" class="rules-list"></div>
        <div class="rule-note">Rules are optional and are created disabled by default.</div>
      </section>

      <section id="links-section" class="card section-panel hidden">
        <div class="section-title">Copy links</div>
        <div class="form-row">
          <label for="copy-format-select" class="section-title">Format</label>
          <select id="copy-format-select">
            <option value="markdown">Markdown</option>
            <option value="plain">Plain text</option>
            <option value="html">HTML</option>
            <option value="json">JSON</option>
          </select>
        </div>
        <div class="copy-grid">
          <button type="button" class="small-button" data-copy-action="current-tab">Current tab</button>
          <button type="button" class="small-button" data-copy-action="current-window">Current window</button>
          <button type="button" class="small-button" data-copy-action="all-tabs">All tabs</button>
          <button type="button" class="small-button" data-copy-action="current-domain">Current domain</button>
        </div>
      </section>

      <section id="snippets-section" class="card section-panel hidden">
        <div class="section-title">Personal snippets</div>
        <div class="form-row">
          <input id="snippet-title-input" type="text" placeholder="Snippet title" />
          <textarea id="snippet-content-input" placeholder="Snippet content"></textarea>
          <button id="add-snippet-button" type="button" class="small-button">Add snippet</button>
        </div>
        <div id="snippets-list" class="snippets-list"></div>
      </section>

      <section id="cleanup-section" class="card section-panel hidden">
        <div class="section-title">Cleanup</div>
        <div class="form-row cleanup-controls">
          <label class="field-label" for="inactive-threshold-input">Inactive threshold (hours)</label>
          <input id="inactive-threshold-input" type="number" min="1" step="1" />
          <label class="checkbox-row" for="include-pinned-cleanup-input">
            <input id="include-pinned-cleanup-input" type="checkbox" />
            <span>Include pinned tabs</span>
          </label>
          <button id="refresh-cleanup-button" type="button" class="small-button">Refresh</button>
          <button id="close-inactive-button" type="button" class="small-button danger">Close inactive tabs</button>
        </div>
        <div id="cleanup-summary" class="cleanup-summary"></div>
        <div id="cleanup-save-offer" class="cleanup-offer hidden">
          <input id="cleanup-session-name-input" type="text" placeholder="Session name" />
          <div class="confirmation-controls">
            <button id="save-close-inactive-button" type="button" class="small-button danger">Save and close</button>
            <button id="close-without-saving-button" type="button" class="small-button danger">Close only</button>
          </div>
          <button id="cancel-cleanup-button" type="button" class="small-button">Cancel</button>
        </div>
        <div id="cleanup-list" class="cleanup-list"></div>
      </section>

      <section id="notes-section" class="card section-panel hidden">
        <div class="section-title">Notes</div>
        <div id="notes-context" class="note-context"></div>
        <div class="form-row">
          <select id="note-scope-select">
            <option value="url">Exact URL</option>
            <option value="domain">Domain</option>
          </select>
          <textarea id="note-content-input" placeholder="Note for current tab"></textarea>
          <button id="save-note-button" type="button" class="small-button">Save note</button>
          <button id="cancel-note-edit-button" type="button" class="small-button hidden">Cancel edit</button>
        </div>
        <div id="tab-notes-list" class="notes-list"></div>
      </section>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
